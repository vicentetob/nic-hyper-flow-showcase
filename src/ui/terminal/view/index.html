<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}';" />
  <title>Nic Hyper Flow Terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111827;
      --panel-2: #0f172a;
      --border: rgba(255,255,255,0.08);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--vscode-font-family, Consolas, monospace);
      overflow: hidden;
    }
    .layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }
    /* Barra Superior Compacta */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sessions {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none; /* Firefox */
      flex: 1;
    }
    .sessions::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .session-item {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
      transition: all 0.2s;
    }
    .session-item.active {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.4);
      color: #fff;
    }
    .session-id { font-weight: 600; }
    
    .main {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .header-compact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px;
      background: rgba(255,255,255,0.01);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    .header-compact h2 {
      margin: 0;
      font-size: 12px;
      color: var(--text);
    }
    .meta-inline {
      display: flex;
      gap: 12px;
    }
    .terminal-wrap {
      flex: 1;
      min-height: 0;
      background: #020617;
      position: relative;
    }
    pre#output {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: auto;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.4;
      font-size: 13px;
      font-family: var(--vscode-editor-font-family, 'Fira Code', monospace);
    }
    .composer {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--panel);
      border-top: 1px solid var(--border);
    }
    input {
      flex: 1;
      height: 32px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      padding: 0 10px;
      outline: none;
      font-size: 13px;
    }
    button {
      height: 32px;
      padding: 0 15px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
    button.primary { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.4); }
    button:hover { background: rgba(255,255,255,0.1); }
    
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .dot.live { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
    .dot.dead { background: var(--danger); }
    .empty { color: var(--muted); font-size: 12px; padding: 4px; }

    /* Esconder o que não cabe no modo compacto */
    .hide-compact { display: none; }
  </style>
</head>
<body>
  <div class="layout">
    <header class="top-bar">
      <div id="sessions" class="sessions">
        <div class="empty">Carregando sessões...</div>
      </div>
    </header>

    <main class="main">
      <div class="header-compact">
        <div style="display: flex; align-items: center; gap: 8px;">
          <h2 id="session-title">-</h2>
          <span id="session-subtitle" style="opacity: 0.6;"></span>
        </div>
        <div class="meta-inline">
          <span id="status"><span class="dot dead"></span></span>
          <span id="pid">PID: -</span>
          <span id="cwd-meta"></span>
        </div>
      </div>

      <div class="terminal-wrap">
        <pre id="output"></pre>
      </div>

      <div class="composer">
        <input id="command" placeholder="Comando..." autocomplete="off" />
        <button id="send" class="primary">Executar</button>
        <button id="stop">Kill</button>
      </div>
    </main>
  </div>

  <!-- Elementos fantasmas para manter compatibilidade com o app.ts sem erro de ref -->
  <div style="display:none">
    <span id="state"></span>
    <span id="session-meta"></span>
    <span id="backend-meta"></span>
  </div>

  <script nonce="{{NONCE}}" src="{{APP_JS_URI}}"></script>
</body>
</html>
